<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thawani Payment Gateway</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.05));
      animation: float 20s infinite ease-in-out;
    }
    
    .bubble-1 {
      width: 300px;
      height: 300px;
      left: -50px;
      top: 10%;
      animation-delay: 0s;
      animation-duration: 25s;
    }
    
    .bubble-2 {
      width: 200px;
      height: 200px;
      right: -30px;
      top: 30%;
      animation-delay: -5s;
      animation-duration: 20s;
    }
    
    .bubble-3 {
      width: 250px;
      height: 250px;
      left: 20%;
      bottom: -50px;
      animation-delay: -10s;
      animation-duration: 30s;
    }
    
    .bubble-4 {
      width: 150px;
      height: 150px;
      right: 25%;
      top: -30px;
      animation-delay: -15s;
      animation-duration: 22s;
    }
    
    .bubble-5 {
      width: 180px;
      height: 180px;
      left: 40%;
      bottom: 20%;
      animation-delay: -8s;
      animation-duration: 28s;
    }
    
    .bubble-6 {
      width: 220px;
      height: 220px;
      right: 10%;
      bottom: 10%;
      animation-delay: -12s;
      animation-duration: 24s;
    }
    
    @keyframes float {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      25% {
        transform: translate(30px, -30px) scale(1.1);
      }
      50% {
        transform: translate(-20px, 20px) scale(0.9);
      }
      75% {
        transform: translate(20px, 30px) scale(1.05);
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // Mock Payment API - Built-in
    class PaymentAPI {
      constructor() {
        this.sessions = new Map();
      }

      createSession(amount, currency, description) {
        const sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        const session = {
          session_id: sessionId,
          amount: amount,
          currency: currency,
          description: description,
          status: 'pending',
          created_at: new Date().toISOString()
        };
        this.sessions.set(sessionId, session);
        return session;
      }

      processPayment(sessionId, cardNumber, cardName, expiry, cvv) {
        const session = this.sessions.get(sessionId);
        if (!session) {
          return { success: false, message: 'Session not found' };
        }

        const cleanCard = cardNumber.replace(/\s/g, '');
        
        // Check if it's the fail card
        if (cleanCard === '42424242424242') {
          session.status = 'failed';
          session.failure_reason = 'Card declined';
          this.sessions.set(sessionId, session);
          
          return {
            success: false,
            message: 'Payment failed',
            data: {
              session_id: sessionId,
              status: 'failed',
              amount: session.amount,
              currency: session.currency,
              failure_reason: 'Card declined'
            }
          };
        }

        // Success
        session.status = 'success';
        session.transaction_id = 'txn_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        this.sessions.set(sessionId, session);

        return {
          success: true,
          message: 'Payment successful',
          data: {
            session_id: sessionId,
            transaction_id: session.transaction_id,
            status: 'success',
            amount: session.amount,
            currency: session.currency
          }
        };
      }

      getSession(sessionId) {
        return this.sessions.get(sessionId);
      }
    }

    // Initialize API
    const paymentAPI = new PaymentAPI();

    // Create initial session
    const urlParams = new URLSearchParams(window.location.search);
    let currentSession;
    
    if (urlParams.get('session_id')) {
      currentSession = paymentAPI.getSession(urlParams.get('session_id'));
    }
    
    if (!currentSession) {
      currentSession = paymentAPI.createSession(
        urlParams.get('amount') || '3.000',
        urlParams.get('currency') || 'OMR',
        urlParams.get('description') || 'Confirm Appointment'
      );
    }

    // Render App
    function renderApp() {
      const root = document.getElementById('root');
      
      const state = {
        cardNumber: '',
        expiryDate: '',
        cvv: '',
        cardName: '',
        showResult: false,
        isSuccess: false,
        loading: false
      };

      function formatCardNumber(value) {
        const cleaned = value.replace(/\s/g, '');
        const chunks = cleaned.match(/.{1,4}/g) || [];
        return chunks.join(' ');
      }

      function updateState(updates) {
        Object.assign(state, updates);
        render();
      }

      function handleCardNumberChange(e) {
        const value = e.target.value.replace(/\s/g, '');
        if (value.length <= 16 && /^\d*$/.test(value)) {
          updateState({ cardNumber: formatCardNumber(value) });
        }
      }

      function handleExpiryChange(e) {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length >= 2) {
          value = value.slice(0, 2) + ' / ' + value.slice(2, 4);
        }
        if (value.length <= 7) {
          updateState({ expiryDate: value });
        }
      }

      function handleCvvChange(e) {
        const value = e.target.value;
        if (value.length <= 3 && /^\d*$/.test(value)) {
          updateState({ cvv: value });
        }
      }

      function handlePay() {
        updateState({ loading: true });
        
        setTimeout(() => {
          const result = paymentAPI.processPayment(
            currentSession.session_id,
            state.cardNumber,
            state.cardName,
            state.expiryDate,
            state.cvv
          );
          
          updateState({ 
            showResult: true, 
            isSuccess: result.success,
            loading: false 
          });

          // Log result for API access
          console.log('Payment Result:', result);
          console.log('Access via: window.lastPaymentResult');
          window.lastPaymentResult = result;
        }, 1000);
      }

      function handleReset() {
        updateState({
          cardNumber: '',
          expiryDate: '',
          cvv: '',
          cardName: '',
          showResult: false,
          loading: false
        });
      }

      function render() {
        if (state.showResult) {
          root.innerHTML = `
            <div class="min-h-screen relative overflow-hidden flex items-center justify-center p-4">
              <div class="absolute inset-0 bg-gradient-to-br from-green-700 via-green-600 to-green-800">
                <div class="absolute inset-0 opacity-30">
                  <div class="bubble bubble-1"></div>
                  <div class="bubble bubble-2"></div>
                  <div class="bubble bubble-3"></div>
                  <div class="bubble bubble-4"></div>
                  <div class="bubble bubble-5"></div>
                  <div class="bubble bubble-6"></div>
                </div>
              </div>
              
              <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8 relative z-10">
                <div class="text-center">
                  ${state.isSuccess ? `
                    <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                      <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                      </svg>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">Payment Successful!</h2>
                    <p class="text-gray-600 mb-6">Your payment has been processed successfully.</p>
                  ` : `
                    <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
                      <svg class="w-10 h-10 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" />
                      </svg>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">Payment Failed</h2>
                    <p class="text-gray-600 mb-6">We couldn't process your payment. Please try again with a different card.</p>
                  `}
                  
                  <div class="bg-gray-50 rounded-lg p-4 mb-6">
                    <div class="flex justify-between items-center mb-2">
                      <span class="text-gray-600">Item</span>
                      <span class="font-semibold text-gray-800">${currentSession.description}</span>
                    </div>
                    <div class="flex justify-between items-center">
                      <span class="text-gray-600">Amount</span>
                      <span class="font-semibold text-gray-800">${currentSession.amount} ${currentSession.currency}</span>
                    </div>
                  </div>

                  <button
                    onclick="window.handleReset()"
                    class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-3 px-4 rounded-lg transition-colors"
                  >
                    ${state.isSuccess ? 'Done' : 'Try Again'}
                  </button>
                </div>
              </div>
            </div>
          `;
        } else {
          root.innerHTML = `
            <div class="min-h-screen relative overflow-hidden flex items-center justify-center p-4">
              <div class="absolute inset-0 bg-gradient-to-br from-green-700 via-green-600 to-green-800">
                <div class="absolute inset-0 opacity-30">
                  <div class="bubble bubble-1"></div>
                  <div class="bubble bubble-2"></div>
                  <div class="bubble bubble-3"></div>
                  <div class="bubble bubble-4"></div>
                  <div class="bubble bubble-5"></div>
                  <div class="bubble bubble-6"></div>
                </div>
              </div>
              
              <div class="w-full max-w-4xl relative z-10">
                <div class="grid md:grid-cols-2 gap-8">
                  <div class="bg-white rounded-2xl shadow-2xl p-8">
                    <div class="flex items-center gap-3 mb-8">
                      <button class="text-gray-600 hover:text-gray-800">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                        </svg>
                      </button>
                      <div class="flex items-center gap-2">
                        <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center">
                          <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
                          </svg>
                        </div>
                        <span class="font-semibold text-gray-800">Thawani Payment</span>
                      </div>
                    </div>

                    <div class="space-y-4 mb-8">
                      <div class="flex justify-between items-center py-3 border-b border-gray-100">
                        <span class="text-gray-600">${currentSession.description}</span>
                        <span class="font-semibold text-gray-800">${currentSession.amount} ${currentSession.currency}</span>
                      </div>
                      
                      <div class="flex justify-between items-center pt-4">
                        <span class="text-lg font-bold text-gray-800">Total</span>
                        <span class="text-2xl font-bold text-emerald-500">${currentSession.amount} ${currentSession.currency}</span>
                      </div>
                    </div>

                    <div class="flex items-center justify-center gap-2 text-sm text-gray-500 pt-6 border-t border-gray-100">
                      <span>Powered by</span>
                      <div class="flex items-center gap-1">
                        <div class="w-6 h-6 bg-emerald-500 rounded flex items-center justify-center">
                          <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
                          </svg>
                        </div>
                        <span class="font-semibold text-emerald-600">thawani</span>
                      </div>
                    </div>
                  </div>

                  <div class="bg-white rounded-2xl shadow-2xl p-8">
                    <h2 class="text-2xl font-bold text-gray-800 mb-8">Pay with card</h2>

                    <div class="space-y-6">
                      <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                          Card informations
                        </label>
                        <div class="relative">
                          <input
                            type="text"
                            id="cardNumber"
                            value="${state.cardNumber}"
                            placeholder="Card number"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none"
                          />
                          <div class="absolute right-3 top-1/2 -translate-y-1/2 flex gap-2">
                            <svg class="w-8 h-6" viewBox="0 0 48 32" fill="none">
                              <rect width="48" height="32" rx="4" fill="#1434CB"/>
                              <path d="M17.5 16L13 12v8l4.5-4z" fill="#FFB600"/>
                              <path d="M19.5 16L24 12v8l-4.5-4z" fill="#F7981D"/>
                              <path d="M21.5 16L26 12v8l-4.5-4z" fill="#FF8500"/>
                            </svg>
                            <svg class="w-8 h-6" viewBox="0 0 48 32" fill="none">
                              <rect width="48" height="32" rx="4" fill="#EB001B"/>
                              <circle cx="19" cy="16" r="10" fill="#FF5F00"/>
                              <circle cx="29" cy="16" r="10" fill="#F79E1B"/>
                            </svg>
                          </div>
                        </div>
                      </div>

                      <div class="grid grid-cols-2 gap-4">
                        <input
                          type="text"
                          id="expiry"
                          value="${state.expiryDate}"
                          placeholder="MM / YY"
                          class="px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none"
                        />
                        <input
                          type="text"
                          id="cvv"
                          value="${state.cvv}"
                          placeholder="CVV"
                          class="px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none"
                        />
                      </div>

                      <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                          Name on card
                        </label>
                        <input
                          type="text"
                          id="cardName"
                          value="${state.cardName}"
                          placeholder="Full name"
                          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none"
                        />
                      </div>

                      <button
                        onclick="window.handlePay()"
                        ${!state.cardNumber || !state.expiryDate || !state.cvv || !state.cardName || state.loading ? 'disabled' : ''}
                        class="w-full bg-emerald-500 hover:bg-emerald-600 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-semibold py-4 px-4 rounded-lg transition-colors text-lg"
                      >
                        ${state.loading ? 'Processing...' : `Pay ${currentSession.amount} ${currentSession.currency}`}
                      </button>

                      <button
                        onclick="window.handleReset()"
                        class="w-full text-red-500 hover:text-red-600 font-medium py-2 transition-colors"
                      >
                        Cancel
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          `;

          // Attach event listeners
          const cardNumberInput = document.getElementById('cardNumber');
          const expiryInput = document.getElementById('expiry');
          const cvvInput = document.getElementById('cvv');
          const cardNameInput = document.getElementById('cardName');

          if (cardNumberInput) cardNumberInput.oninput = handleCardNumberChange;
          if (expiryInput) expiryInput.oninput = handleExpiryChange;
          if (cvvInput) cvvInput.oninput = handleCvvChange;
          if (cardNameInput) cardNameInput.oninput = (e) => updateState({ cardName: e.target.value });
        }
      }

      // Expose functions globally
      window.handlePay = handlePay;
      window.handleReset = handleReset;

      // Initial render
      render();
    }

    // Start app
    renderApp();

    // Expose API for external use
    window.ThawaniPaymentAPI = {
      // Create a new payment session and reload page with it
      createPayment: function(amount, currency, description) {
        const url = new URL(window.location.href);
        url.searchParams.set('amount', amount);
        url.searchParams.set('currency', currency);
        url.searchParams.set('description', description);
        window.location.href = url.toString();
      },
      
      // Get last payment result
      getLastResult: function() {
        return window.lastPaymentResult;
      },

      // Test cards
      cards: {
        success: '1234567890123456',
        fail: '42424242424242'
      }
    };

    // Log API info
    console.log(`
╔═══════════════════════════════════════════════════════════╗
║           Thawani Payment Gateway - Single Page          ║
╠═══════════════════════════════════════════════════════════╣
║                                                           ║
║  🔧 API Usage:                                           ║
║                                                           ║
║  window.ThawaniPaymentAPI.createPayment(                 ║
║    '5.000',                                              ║
║    'OMR',                                                ║
║    'Custom Payment'                                      ║
║  )                                                       ║
║                                                           ║
║  window.ThawaniPaymentAPI.getLastResult()                ║
║                                                           ║
║  💳 Test Cards:                                          ║
║  Success: 1234567890123456 (any 16-digit)               ║
║  Fail:    42424242424242 (14-digit)                     ║
║                                                           ║
║  🔗 URL Parameters:                                      ║
║  ?amount=3.000&currency=OMR&description=Appointment      ║
║                                                           ║
╚═══════════════════════════════════════════════════════════╝
    `);
  </script>
</body>
</html>
